<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Fale Conosco </title>
</head>
<body>
    <h1> Fale Conosco </h1>
    <fieldset>
        <legend> Dúvidas e sugestões </legend>
    <form action="Dados_Fornumario.js" method="get" target="_parent" enctype="application/x-www-form-urlencoded">
        <label for="nome">* Nome: </label>
        <input type="text" id=" nome" required pattern="[azAZ]+" placeholder="Nome Completo" maxlength="100">
        <br><br>
        <label for="email" > * E-mail: </label>
        <input type="email" id="email" placeholder=" E-mail" required>
        <br><br>
        <label for="tel" >* Telefone </label>
        <input type="tel" placeholder="(84) 99999-9999" maxlength="11" pattern="[0...9]">
        <br><br>
        <label for="data">* Data </label>
        <input type="date">
        <br><br>
        <label for="mensagem"> Mensagem </label>
        <br>
        <textarea name="mensagem" id="mensagem" rows="5" cols="30"></textarea>
        <br><br>
        
    </form>
    </fieldset>
</body>
</html>
